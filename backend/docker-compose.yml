version: '3.8'

services:
  tradebot:
    build:
      context: .
      dockerfile: Dockerfile
    image: tradebot-backend:latest
    container_name: tradebot-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    environment:
      - ENVIRONMENT=development
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-tradebot-super-secure-jwt-key-2026-key-here-12345!}
      - API_ALLOWED_ORIGINS=${API_ALLOWED_ORIGINS:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
